# Netlify configuration

[build]
  publish = "."
  command = ""

# ── 301 Redirects: Old WordPress URLs → new static pages ──────────
# Project posts (WordPress date-based URLs)
[[redirects]]
  from = "/2024/09/12/woolwich-town-hall/*"
  to = "/projects/woolwich-town-hall.html"
  status = 301
[[redirects]]
