# WordPress category/author/archive catch-alls
[[redirects]]
  from = "/category/*"
  to = "/projects.html"
  status = 301
[[redirects]]
  from = "/author/*"
  to = "/"
  status = 301
[[redirects]]
  from = "/page/*"
  to = "/"
  status = 301

# Catch-all for any remaining WordPress date-based post URLs
[[redirects]]
  from = "/20??/??/??/*"
  to = "/projects.html"
  status = 301

